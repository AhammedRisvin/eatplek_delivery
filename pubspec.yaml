name: eatplek_delivery
description: EatPlek Delivery Partner App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Storage
  shared_preferences: ^2.2.2

  # Network
  http: ^1.2.1

  # Images
  cached_network_image: ^3.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Utilities
  url_launcher: ^6.2.6
  intl: ^0.19.0

  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
